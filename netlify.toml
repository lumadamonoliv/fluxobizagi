[build]
  # Define o diretório que contém os arquivos a serem publicados
  publish = "public"
  
  # Não há comando de build necessário pois é um site estático
  command = "echo 'Site estático - sem build necessário'"

# Configurações de headers para melhorar o desempenho
[[headers]]
  for = "/*"
  [headers.values]
    # Cache para arquivos estáticos
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/libs/*"
  [headers.values]
    # Cache mais longo para bibliotecas (1 ano)
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "*.svg"
  [headers.values]
    Content-Type = "image/svg+xml; charset=utf-8"

# Configuração de redirecionamentos (se necessário)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  conditions = {Role = ["admin"]}
